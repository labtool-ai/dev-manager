  >
    <!-- Track 0: full-bleed cream ground (own clip layer, NOT on #root) -->
    <div
      class="clip ground"

    ></div>

    <!-- Track 1: stats-heatmap screenshot HERO — settles, then holds -->
    <div
      class="clip stage"

    >
      <div class="camera" id="s5-camera">
        <div class="window" id="s5-window">
          <img
            class="shot"
            src="assets/stats-heatmap.png"
            alt="DevManager launch statistics and activity heatmap"
          />

          <!-- Mint count-up numbers overlaid on the 4 top stat positions -->
          <!-- (positioned in native-image % so they track the screenshot) -->
          <div class="stat-num" id="s5-n0" style="left: 22.7%">0</div>
          <div class="stat-num" id="s5-n1" style="left: 36.4%">0</div>
          <div class="stat-num suffix-s" id="s5-n2" style="left: 49.5%">0</div>
          <div class="stat-num day" id="s5-n3" style="left: 63.1%">0</div>

          <!-- Mint column-reveal laid over the heatmap grid region -->

    <!-- Track 2: copy line 你的本地开发，数据看得见 — per-word reveal, above the caption keep-out -->

    >
      <div class="copy-inner" id="s5-copy-inner">
        <span class="cw">你</span><span class="cw">的</span><span class="cw">本</span
        ><span class="cw">地</span><span class="cw">开</span><span class="cw">发</span
        ><span class="cw copy-comma">，</span><span class="cw">数</span
        ><span class="cw">据</span><span class="cw">看</span><span class="cw">得</span
        ><span class="cw">见</span>
      </div>
    </div>

    <style>
@font-face{font-family:'PingFang SC';src:local('PingFang SC');}
@font-face{font-family:'Heiti SC';src:local('Heiti SC');}
@font-face{font-family:'SF Mono';src:local('SF Mono'),local('SFMono-Regular');}
@font-face{font-family:'Menlo';src:local('Menlo');}

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        font-family: "PingFang SC", "Heiti SC", system-ui, sans-serif;
      }

      /* full-bleed cream ground */
      .ground {
        position: absolute;
        inset: 0;
        background: #f5f5f4;
      }

      /* ---- screenshot hero stage ---- */
      .stage {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        pointer-events: none;
      }
      .camera {
        position: relative;
        margin-top: 48px;
        transform-origin: 50% 40%;
        will-change: transform;
      }
      .window {
        position: relative;
        width: 1120px; /* 2130×1680 -> ~58% of 1920, anchored high */
        transform-origin: 50% 40%;
        will-change: transform, opacity;
      }
      .shot {
        display: block;
        width: 100%;
        height: auto;
      }

      /* ---- mint count-up numbers over the 4 top stat positions ---- */
      /* native stat number baseline ~y=355/1680 = 21.1%; card row band */
      .stat-num {
        position: absolute;
        top: 19.4%;
        width: 15%;
        margin-left: -7.5%; /* half of width -> centers without a CSS transform */
        text-align: center;
        font-family: "PingFang SC", "Heiti SC", system-ui, sans-serif;
        font-weight: 700;
        font-size: 44px;
        line-height: 1;
        letter-spacing: -0.01em;
        color: #2dd4bf;
        font-variant-numeric: tabular-nums;
        opacity: 0;
        will-change: opacity, transform;
      }
      /* the suffix glyphs ride as :after via JS-set textContent — kept simple as text */

      /* ---- heatmap column reveal overlay ---- */
      /* grid region in native %: left 352->1778 x, top 546->722 y (of 2130x1680) */
      .heat {
        position: absolute;
        left: 16.53%; /* 352/2130 */
        top: 32.5%; /* 546/1680 */
        width: 66.95%; /* (1778-352)/2130 */
        height: 10.48%; /* (722-546)/1680 */
        display: flex;
        gap: 0.42%;
        pointer-events: none;
      }
      .heat-col {
        flex: 1 1 0;
        display: flex;
        flex-direction: column;
        gap: 8%;

        will-change: opacity, transform;
      }
      .heat-cell {
        flex: 1 1 0;
        border-radius: 2px;

      }

      /* glow bloom behind the last (today) column */
      .today-glow {
        position: absolute;
        left: 82.6%; /* over the far-right column */
        top: 30%;
        width: 6%;
        height: 15%;
        margin-left: -3%; /* half of width -> centers without a CSS transform */
        background: radial-gradient(
          ellipse at center,
          rgba(45, 212, 191, 0.55) 0%,
          rgba(45, 212, 191, 0.28) 40%,
          rgba(45, 212, 191, 0) 72%
        );
        opacity: 0;
        pointer-events: none;
        will-change: opacity, transform;
      }

      /* ---- copy line ---- */
      .copy-clip {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;

        display: flex;
        justify-content: center;
        align-items: flex-start;
        pointer-events: none;
      }
      .copy-inner {
        margin-top: 772px; /* baseline ~800, comfortably above the 900 keep-out */
        font-family: "PingFang SC", "Heiti SC", system-ui, sans-serif;
        font-weight: 600;
        font-size: 56px;

      .copy-inner .cw {

      /* accent the data half of the phrase in mint */

    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* ---------- Build the heatmap column-reveal overlay ---------- */
      const COLS = 52;
      const ROWS = 7;
      const heat = document.getElementById("s5-heat");
      const cols = [];
      for (let c = 0; c < COLS; c++) {
        const col = document.createElement("div");
        col.className = "heat-col";
        for (let r = 0; r < ROWS; r++) {
          const cell = document.createElement("div");
          cell.className = "heat-cell";
          // deterministic per-cell alpha so the fill reads like real activity,
          // not a flat block — derived from a fixed hash, no randomness.
          const h = (c * 7 + r * 13 + 5) % 11;
          cell.style.opacity = String(0.32 + (h / 11) * 0.58);
          col.appendChild(cell);
        }
        heat.appendChild(col);
        cols.push(col);
      }

      const camera = document.getElementById("s5-camera");
      const win = document.getElementById("s5-window");
      const nums = [
        document.getElementById("s5-n0"),
        document.getElementById("s5-n1"),
        document.getElementById("s5-n2"),
        document.getElementById("s5-n3"),
      ];
      const copyWords = gsap.utils.toArray("#s5-copy .cw");
      const todayGlow = document.getElementById("s5-today-glow");

      /* =========================================================
         Scene 1 (0.0–1.2s): screenshot settles; 4 top numbers
         count up 0 -> value (mint, tabular). power3, no bounce.
         ========================================================= */

      // window settles in (fromTo so t=0 is the pre-settle state — hero visible by t<=0.5s)
      tl.fromTo(
        win,
        { opacity: 0, scale: 1.04, y: 14 },
        { opacity: 1, scale: 1, y: 0, duration: 0.6, ease: "power3.out" },
        0
      );

      // Four count-up stats. Each proxy co-drives value + a gentle size/opacity settle.
      // Values map to the real stat page: 7 (total launches), 1 (min),
      // 27 (s, longest single run), 1 (day, current streak).
      const STATS = [
        { el: nums[0], to: 7, suffix: "", size: 48 },
        { el: nums[1], to: 1, suffix: "m", size: 46 },
        { el: nums[2], to: 27, suffix: "s", size: 44 },
        { el: nums[3], to: 1, suffix: " 天", size: 40 },
      ];

      STATS.forEach((s) => {
        // reveal the number container (mint) as the count begins
        tl.fromTo(
          s.el,
          { opacity: 0, y: 8 },
          { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
          0.25
        );
        const state = { v: 0, fs: s.size * 0.6 };
        tl.to(
          state,
          {
            v: s.to,
            fs: s.size,
            duration: 0.85,
            ease: "power3.out",
            onUpdate: () => {
              s.el.textContent = Math.round(state.v) + s.suffix;
              s.el.style.fontSize = state.fs + "px";
            },
          },
          0.3
        );
      });

      /* =========================================================
         Scene 2 (1.2–2.6s): heatmap cells fill column-by-column,
         left -> right, in mint. stat-bars-and-fills (fill sweep).
         ========================================================= */
      // Each column reveals with a short opacity+rise, staggered across the
      // window so the mint fill sweeps left->right. Deterministic index stagger.
      const COL_START = 1.2;
      const COL_SPAN = 1.3; // fill completes by ~2.5s
      const COL_STEP = COL_SPAN / COLS;
      cols.forEach((col, i) => {
        tl.fromTo(
          col,
          { opacity: 0, y: 6 },
          { opacity: 1, y: 0, duration: 0.26, ease: "power2.out" },
          COL_START + i * COL_STEP
        );
      });

      /* =========================================================
         Scene 3 (2.6–3.4s): 你的本地开发，数据看得见 — per-word reveal
         (below the heatmap, above the caption keep-out).
         ========================================================= */
      copyWords.forEach((el, i) => {
        tl.fromTo(
          el,
          { y: 24, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.42, ease: "power3.out" },
          2.62 + i * 0.05
        );
      });

      /* =========================================================
         Scene 4 (3.4–4.0s): HOLD. last (today) column glow-blooms;
         subtle jitter. ambient-glow-bloom + sine-wave-loop (low amp).
         NOT the final frame -> no exit tween.
         ========================================================= */
      // glow blooms in behind the today column and holds (bloom-and-hold form)
      tl.fromTo(
        todayGlow,
        { opacity: 0, scale: 0.85 },
        { opacity: 1, scale: 1, duration: 0.5, ease: "power2.out" },
        3.4
      );

      // subtle jitter on the settled screenshot camera (low-amplitude hold move).
      // sin(0)=0 so it begins exactly at the settled resting transform — no jump.
      const jit = { p: 0 };
      tl.to(
        jit,
        {
          p: Math.PI * 2 * 0.7,
          duration: 0.6, // 3.4 -> 4.0
          ease: "none",
          onUpdate: () => {
            const dx = Math.sin(jit.p) * 2;
            const dy = Math.sin(jit.p * 1.3) * 1.4;
            camera.style.transform =
              "translate(" + dx + "px, " + dy + "px)";
            // breathe the glow a hair around its peak (bounded, seek-safe)
            const g = 1 + Math.sin(jit.p) * 0.03;
            todayGlow.style.transform = "scale(" + g + ")";
          },
        },
        3.4
      );

      window.__timelines["05-stats"] = tl;
    </script>
  </div>
</template>
