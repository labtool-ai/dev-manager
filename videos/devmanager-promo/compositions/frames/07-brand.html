    <style>
@font-face{font-family:'PingFang SC';src:local('PingFang SC');}

      #root {

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const bgCard = document.getElementById("b7-bg-card");
      const bgLight = document.getElementById("b7-bg-light");
      const bgDark = document.getElementById("b7-bg-dark");

      const markStage = document.getElementById("b7-mark-stage");
      const plate = document.getElementById("b7-plate");
      const markFinal = document.getElementById("b7-mark-final");
      const frags = gsap.utils.toArray("#b7-mark-stage .frag");

      const titleInner = document.getElementById("b7-title-inner");
      const subWords = gsap.utils.toArray("#b7-sub .sw");
      const urlInner = document.getElementById("b7-url-inner");
      const urlCaret = document.getElementById("b7-url-caret");

      /* =====================================================================
         Scene 1 (0.0–1.6s): background window sits dim(~40%)+blurred, flips
         light -> dark (card-morph-anchor / scale-swap). depth-of-field-blur
         keeps it soft the whole time.
         ===================================================================== */
      // The card is already dim(0.4)+blurred(10px) from CSS at t=0 (seek-safe).
      // A tiny settle-in on scale so it doesn't read as a frozen plate.
      tl.fromTo(
        bgCard,
        { scale: 1.04 },
        { scale: 1.0, duration: 1.4, ease: "power3.out" },
        0.0
      );
      // light -> dark flip: cross-fade the two window images with a shared
      // scale "blink" (card-morph-anchor: old fades early, new fades late).
      tl.to(bgLight, { opacity: 0, duration: 0.5, ease: "power1.in" }, 0.75);
      tl.to(bgDark, { opacity: 1, duration: 0.5, ease: "power1.out" }, 0.9);
      tl.to(
        bgCard,
        {
          scale: 1.015,
          duration: 0.34,
          ease: "power2.inOut",
          yoyo: false,
        },
        0.85
      );
      tl.to(bgCard, { scale: 1.0, duration: 0.36, ease: "power2.out" }, 1.19);

      /* =====================================================================
         Scene 2 (1.6–3.2s): lt logo parts depth-scatter-assemble at center,
         then cross-fade to the real logo.png.
         ===================================================================== */
      const GOLDEN = Math.PI * (3 - Math.sqrt(5)); // ~2.39943 — even spread
      const n = frags.length;
      const RADIUS = 360;
      const Z_NEAR = 320;
      const Z_FAR = -300;
      const TUMBLE = 82;

      // deterministic scatter state per fragment index (no Math.random)
      const scatter = frags.map((el, i) => {
        const a = i * GOLDEN;
        const depthT = n > 1 ? i / (n - 1) : 0;
        return {
          x: Math.cos(a) * RADIUS,
          y: Math.sin(a) * RADIUS,
          z: Z_NEAR - depthT * (Z_NEAR - Z_FAR),
          rotationX: Math.sin(a) * TUMBLE,
          rotationY: Math.cos(a) * TUMBLE,
        };
      });

      // park each fragment in the cloud BEFORE any tween fires (seek-safe t=0).
      // x/y here are DELTAS layered on the CSS margin-centering, so target is
      // (dataTargetX, dataTargetY) relative to the mark center.
      frags.forEach((el, i) => {
        const s = scatter[i];
        gsap.set(el, {
          x: s.x,
          y: s.y,
          z: s.z,
          rotationX: s.rotationX,
          rotationY: s.rotationY,
          opacity: 0,
        });
      });

      // plate fades in first as the ground the parts land on
      tl.fromTo(
        plate,
        { opacity: 0, scale: 0.86 },
        { opacity: 1, scale: 1, duration: 0.5, ease: "power3.out" },
        1.55
      );

      // gentle cloud spin so the scatter has life before it locks
      tl.to(
        markStage,
        { rotationY: 26, duration: 1.4, ease: "power1.out" },
        1.55
      );
      tl.to(
        markStage,
        { rotationY: 0, duration: 0.5, ease: "power2.out" },
        2.75
      );

      // ASSEMBLE — each fragment flies from its cloud point to its flat target
      const ASSEMBLE_DUR = 0.92;
      const STAGGER = 0.07;
      frags.forEach((el, i) => {
        tl.to(
          el,
          {
            x: Number(el.dataset.targetX),
            y: Number(el.dataset.targetY),
            z: 0,
            rotationX: 0,
            rotationY: 0,
            opacity: 1,
            duration: ASSEMBLE_DUR,
            ease: "power3.out",
          },
          1.68 + i * STAGGER
        );
      });

      // cross-fade assembled blocks -> real logo.png (blocks fade under the image)
      tl.to(markFinal, { opacity: 1, duration: 0.42, ease: "power2.inOut" }, 3.0);
      frags.forEach((el) => {
        tl.to(el, { opacity: 0, duration: 0.42, ease: "power2.inOut" }, 3.0);
      });
      tl.to(plate, { opacity: 0, duration: 0.42, ease: "power2.inOut" }, 3.0);

      /* =====================================================================
         Scene 3 (3.2–4.4s): big「DevManager」spring-pop under the mark;
         subtitle per-word reveal.
         ===================================================================== */
      tl.fromTo(
        titleInner,
        { scale: 0, opacity: 0, y: 20 },
        { scale: 1, opacity: 1, y: 0, duration: 0.6, ease: "power3.out" },
        3.3
      );
      // per-word reveal of the subtitle (deterministic index stagger)
      subWords.forEach((el, i) => {
        tl.fromTo(
          el,
          { y: 24, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.46, ease: "power3.out" },
          3.72 + i * 0.05
        );
      });

      /* =====================================================================
         Scene 4 (4.4–5.4s): labtool fades in at bottom; mint caret blinks once.
         ===================================================================== */
      tl.to(urlInner, { opacity: 1, duration: 0.5, ease: "power2.out" }, 4.5);
      // caret blinks ONCE: on -> off -> on (finite, deterministic; not a loop)
      tl.set(urlCaret, { opacity: 1 }, 4.62);
      tl.set(urlCaret, { opacity: 0 }, 4.98);
      tl.set(urlCaret, { opacity: 1 }, 5.30);

      /* =====================================================================
         Scene 5 (5.4–6.0s): final hold; subtle jitter on the mark, then settle.
         Final frame — a gentle settle is allowed. Amplitude fades to 0 in tail.
         ===================================================================== */
      const jitter = { p: 0 };
      const J_DUR = 0.6; // 5.4 -> 6.0
      tl.to(
        jitter,
        {
          p: Math.PI * 2 * 1.0,
          duration: J_DUR,
          ease: "none",
          onUpdate: () => {
            const t = jitter.p / (Math.PI * 2 * 1.0); // 0 -> 1
            const env = t < 0.5 ? 1 : (1 - t) / 0.5; // settle to rest in last half
            const dy = Math.sin(jitter.p) * 2.4 * env;
            markStage.style.transform =
              "translateZ(0) rotateY(0deg) translateY(" + dy + "px)";
          },
        },
        5.4
      );

      window.__timelines["07-brand"] = tl;
    </script>
