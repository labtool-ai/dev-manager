    <!-- Full-bleed cream ground: the ONLY full-bleed layer, on its own clip -->
    <div
      class="clip ground"
      id="a4-ground"
      data-start="0"

      data-track-index="0"
    ></div>

    <!-- LEFT column -->
    <div
      class="clip left"
      id="a4-left"
      data-start="0"
      data-duration="4"
      data-track-index="1"
    >
      <div class="eyebrow" id="a4-eyebrow">新建项目</div>
      <div class="rule" id="a4-rule"></div>
      <div class="line1-wrap">
        <span class="line1" id="a4-line1"></span><span class="caret" id="a4-caret"></span>
      </div>

        <span class="w">按</span><span class="w"> tag</span

    </div>

    <!-- RIGHT hero: dialog (Scenes 1-2), scale-swaps out at Scene 3 -->
    <div
      class="clip dialog"

      data-track-index="2"
    >

      <div class="title-underline" id="a4-underline"></div>
    </div>

    <!-- RIGHT: small "added" result card (Scene 3 handoff), same region -->
    <div
      class="clip result"
      id="a4-result"
      data-start="2.2"
      data-duration="1.8"
      data-track-index="3"
    >
      <div class="rc-row">
        <span class="rc-dot"></span>
        <span class="rc-name">my-app</span>
      </div>
      <div class="rc-meta">~/dev/my-app · npm run dev</div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* ================= LEFT: eyebrow + accent rule ================= */
      tl.fromTo(
        "#a4-eyebrow",
        { opacity: 0, y: 14 },
        { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
        0.0
      );
      tl.fromTo(
        "#a4-rule",
        { scaleX: 0, opacity: 0 },
        { scaleX: 1, opacity: 1, duration: 0.55, ease: "power3.out" },
        0.12
      );

      /* ================= SCENE 1 (0.0-1.1s) =================
         line 1 types on left (discrete-text-sequence) with mint caret;
         dialog slides in from the right and settles (fromTo + spring-pop). */

      // line 1 discrete type-on
      const LINE1 = "填目录 + 命令 = 一个项目";
      const L1_SEQ = [
        { t: 0.15, n: 0 },
        { t: 0.28, n: 3 },
        { t: 0.42, n: 6 },
        { t: 0.56, n: 8 },
        { t: 0.72, n: 11 },
        { t: 0.90, n: 14 },
        { t: 1.05, n: LINE1.length }
      ];
      function line1At(time) {
        let n = 0;
        for (let i = L1_SEQ.length - 1; i >= 0; i--) {
          if (time >= L1_SEQ[i].t) { n = L1_SEQ[i].n; break; }
        }
        return LINE1.substring(0, n);
      }
      const line1El = document.getElementById("a4-line1");
      const caretEl = document.getElementById("a4-caret");

      const l1driver = { t: 0 };
      tl.to(
        l1driver,
        {
          t: 4.0,
          duration: 4.0,
          ease: "none",
          onUpdate: () => {
            line1El.textContent = line1At(l1driver.t);
          }
        },
        0
      );

      // deterministic mint caret blink via sin — solid while typing, blinks after,
      // fades once line 2 takes focus in Scene 3.
      const blink = { p: 0 };
      tl.to(
        blink,
        {
          p: Math.PI * 2 * 5, // 5 cycles / 4s => ~0.8s period
          duration: 4.0,
          ease: "none",
          onUpdate: () => {
            const t = l1driver.t;
            if (t < 0.15) caretEl.style.opacity = "0";
            else if (t < 1.2) caretEl.style.opacity = "1";              // solid while typing
            else if (t < 2.2) caretEl.style.opacity = Math.sin(blink.p) > 0 ? "1" : "0";
            else caretEl.style.opacity = "0";                            // hand focus to line 2
          }
        },
        0
      );

      // dialog slides in from the right + subtle settle (fromTo, smooth power3)
      tl.fromTo(
        "#a4-dialog",
        { opacity: 0, x: 140, scale: 0.94 },
        { opacity: 1, x: 0, scale: 1, duration: 0.9, ease: "power3.out" },
        0.1
      );

      /* ================= SCENE 2 (1.1-2.2s) =================
         calm hold on the already-filled dialog; a single soft mint underline
         appears beneath the dialog's title area (NOT over the input boxes). */
      tl.fromTo(
        "#a4-underline",
        { scaleX: 0, opacity: 0 },
        { scaleX: 1, opacity: 0.9, duration: 0.55, ease: "power3.out" },
        1.35
      );

      /* ================= SCENE 3 (2.2-3.4s) =================
         dialog scale-swaps into the result card; line 2 reveals per-word. */

      // outgoing dialog: shrink + fade fast (power2.in)
      tl.to(
        "#a4-dialog",
        { scale: 0.72, opacity: 0, duration: 0.4, ease: "power2.in" },
        2.25
      );

      // incoming result card: scale up + fade in — smooth power3, NO bounce
      tl.fromTo(
        "#a4-result",
        { scale: 0.72, opacity: 0 },
        { scale: 1.0, opacity: 1, duration: 0.55, ease: "power3.out" },
        2.5
      );

      // line 2 per-word reveal (dynamic-content-sequencing pacing)
      const words = gsap.utils.toArray("#a4-line2 .w");
      words.forEach((w, i) => {
        tl.fromTo(
          w,
          { opacity: 0, y: 18 },
          { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" },
          2.55 + i * 0.11
        );
      });

      /* ================= SCENE 4 (3.4-4.0s) =================
         hold; the mint tag chip pulses once (single bounded sine — subtle jitter). */
      const chipEl = document.getElementById("a4-chip");
      const pulse = { p: 0 };
      tl.to(
        pulse,
        {
          p: Math.PI, // one half-cycle => a single soft up-and-back pulse
          duration: 0.55,
          ease: "none",
          onUpdate: () => {
            const s = 1 + Math.sin(pulse.p) * 0.06;
            chipEl.style.transform = `scale(${s})`;
          }
        },
        3.5
      );

      window.__timelines["04-add"] = tl;
    </script>
