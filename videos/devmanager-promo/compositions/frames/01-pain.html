<template>
  <div
    id="root"
    data-composition-id="01-pain"
    data-width="1920"
    data-height="1080"
    data-duration="4"
    data-track-index="0"
  >
    <!-- gsap loaded INSIDE the template (transport rule) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
@font-face{font-family:'PingFang SC';src:local('PingFang SC');}
@font-face{font-family:'Heiti SC';src:local('Heiti SC');}
@font-face{font-family:'SF Mono';src:local('SF Mono'),local('SFMono-Regular');}
@font-face{font-family:'Menlo';src:local('Menlo');}

      /* Root styled by #id, never a class on the data-composition-id element */
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        font-family: "PingFang SC", "Heiti SC", system-ui, sans-serif;
      }

      /* Full-bleed cream ground as its own clip layer, NOT on #root */
      #p1-ground {
        position: absolute;
        inset: 0;
        background: #f5f5f4;
      }

      /* Faint blurred menubar "ghost" upper-right — a hint of "a pile of services" */
      #p1-ghost {
        position: absolute;
        top: 46px;
        right: 70px;
        width: 360px;
        opacity: 0;
        filter: blur(6px);
        will-change: filter, opacity;
        pointer-events: none;
      }
      #p1-ghost img {
        display: block;
        width: 100%;
        height: auto;
      }

      /* Center stage — everything held above the 83% cutoff (y<=900).
         Region parked around ~0.42 height for landscape center anchor. */
      #p1-stage {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 900px; /* keep-out: content lives above y=900 */
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* All beat lines stack at the exact same center point (only one visible at a time). */
      .p1-line {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        white-space: nowrap;
        text-align: center;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.08;
        opacity: 0;
        will-change: transform, filter, opacity;
      }

      /* Pain lines: near-black ink, big bold display (>=45% frame width read).
         10-char line at this size stays on one line within 1920. */
      .p1-pain {
        color: #0e1413;
        font-size: 158px;
      }

      /* The blinking mint cursor block that carries the rhythm. */
      #p1-caret {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        margin-left: 720px; /* park to the right of the centered line block, on-frame */
        width: 24px;
        height: 138px;
        background: #2dd4bf;
        opacity: 0;
        will-change: opacity;
      }

      /* Mint payoff line — the single accent moment. */
      #p1-payoff {
        color: #2dd4bf;
        font-size: 132px;
        font-weight: 700;
      }

      /* Wrapper used for the Z/blur seam cuts so blur rides the wrapper, not the glyphs. */
      .p1-wrap {
        display: inline-block;
      }
    </style>

    <!-- Full-bleed ground: dedicated clip, full duration, lowest track -->
    <div
      id="p1-ground"
      class="clip"
      data-start="0"
      data-duration="4"
      data-track-index="0"
    ></div>

    <!-- Menubar ghost residue, blurred + faint, upper-right -->
    <div
      id="p1-ghost"
      class="clip"
      data-start="0"
      data-duration="4"
      data-track-index="1"
    >
      <img src="assets/menubar.png" alt="" />
    </div>

    <div
      id="p1-stage"
      class="clip"
      data-start="0"
      data-duration="4"
      data-track-index="2"
    >
      <div class="p1-line p1-pain" id="p1-a"><span class="p1-wrap">6 个终端来回切</span></div>
      <div class="p1-line p1-pain" id="p1-b"><span class="p1-wrap">忘了哪个还在跑</span></div>
      <div class="p1-line p1-pain" id="p1-c"><span class="p1-wrap">端口又撞了，谁占的？</span></div>
      <div class="p1-line" id="p1-payoff"><span class="p1-wrap">本地开发，该有个总控台了</span></div>
      <div id="p1-caret"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* ── Menubar ghost: selective-blur backing (depth-of-field-blur).
         It only ever hints — held faint and soft the whole shot. ── */
      tl.fromTo(
        "#p1-ghost",
        { opacity: 0, "--dof": "0px" },
        { opacity: 0.15, duration: 0.6, ease: "power2.out" },
        0.15
      );

      /* ── ONE beat grid drives all four beats (kinetic-beat-slam spine). ── */
      const PULSE = 0.5;
      // Line A slams at ~0.15; swaps at Scene2 (1.1) and Scene3 (2.1); payoff at 3.1.
      const A_IN = 0.15;
      const B_CUT = 1.1;
      const C_CUT = 2.1;
      const PAY = 3.1;

      /* Helper offsets baked into fromTo so we never fight CSS translate centering:
         the -50%/-50% centering lives in the from/to via xPercent/yPercent. */

      /* Scene 1 (0.0–1.1s): "6 个终端来回切" — kinetic-beat-slam in, power3 settle. */
      tl.fromTo(
        "#p1-a",
        { xPercent: -50, yPercent: -50, scale: 1.42, filter: "blur(16px)", opacity: 0 },
        {
          xPercent: -50,
          yPercent: -50,
          scale: 1,
          filter: "blur(0px)",
          opacity: 1,
          duration: 0.5,
          ease: "power3.out",
        },
        A_IN
      );

      /* ── Seam A→B (1.1s): zoom-through hard cut (cut-catalog).
         Outgoing accelerates toward viewer + blurs; hard cut at peak;
         incoming continues forward from behind. Text-scale peak blur = 10px. ── */
      // Exit A
      tl.to(
        "#p1-a",
        { scale: 1.2, filter: "blur(10px)", duration: 0.2, ease: "power3.in" },
        B_CUT - 0.2
      );
      tl.to(
        "#p1-a",
        { opacity: 0.15, duration: 0.2, ease: "none" },
        B_CUT - 0.2
      );
      // Hard cut
      tl.set("#p1-a", { opacity: 0 }, B_CUT);
      tl.set(
        "#p1-b",
        { xPercent: -50, yPercent: -50, scale: 0.75, filter: "blur(10px)", opacity: 0.15 },
        B_CUT
      );
      // Entry B — continues forward, decelerates into focal plane
      tl.to(
        "#p1-b",
        {
          scale: 1,
          filter: "blur(0px)",
          opacity: 1,
          duration: 0.5,
          ease: "expo.out",
        },
        B_CUT
      );

      /* ── Seam B→C (2.1s): zoom-through hard cut. ── */
      tl.to(
        "#p1-b",
        { scale: 1.2, filter: "blur(10px)", duration: 0.2, ease: "power3.in" },
        C_CUT - 0.2
      );
      tl.to(
        "#p1-b",
        { opacity: 0.15, duration: 0.2, ease: "none" },
        C_CUT - 0.2
      );
      tl.set("#p1-b", { opacity: 0 }, C_CUT);
      tl.set(
        "#p1-c",
        { xPercent: -50, yPercent: -50, scale: 0.75, filter: "blur(10px)", opacity: 0.15 },
        C_CUT
      );
      tl.to(
        "#p1-c",
        {
          scale: 1,
          filter: "blur(0px)",
          opacity: 1,
          duration: 0.5,
          ease: "expo.out",
        },
        C_CUT
      );

      /* ── Seam C→payoff (3.1s): three pain lines resolve into the mint payoff.
         Outgoing pain RECEDES (inverse zoom = arrival beat); payoff spring-pops in. ── */
      tl.to(
        "#p1-c",
        { scale: 0.8, filter: "blur(10px)", duration: 0.2, ease: "power3.in" },
        PAY - 0.2
      );
      tl.to(
        "#p1-c",
        { opacity: 0, duration: 0.2, ease: "none" },
        PAY - 0.2
      );
      // Caret hides as the pain rhythm ends and the payoff takes over.
      tl.set("#p1-caret", { opacity: 0 }, PAY - 0.05);

      /* Payoff: spring-pop entrance (spring-pop-entrance, power3, no overshoot). */
      tl.fromTo(
        "#p1-payoff",
        { xPercent: -50, yPercent: -50, scale: 0, opacity: 0 },
        {
          xPercent: -50,
          yPercent: -50,
          scale: 1,
          opacity: 1,
          duration: 0.55,
          ease: "power3.out",
        },
        PAY
      );

      /* ── Mint cursor rhythm (context-sensitive-cursor style blink).
         Deterministic sin-driven blink across the three pain beats only
         (0.15 → 3.05); it is the visible "rhythm" the lines hard-cut on. ── */
      const caretDriver = { p: 0 };
      const caretStart = 0.15;
      const caretEnd = 3.05;
      const caretDur = caretEnd - caretStart;
      const blinkCycles = Math.round(caretDur / 0.5); // ~0.5s blink cadence = the beat
      tl.fromTo(
        "#p1-caret",
        { opacity: 1 },
        {
          opacity: 1,
          duration: caretDur,
          ease: "none",
          onUpdate: function () {
            const prog = this.progress();
            const phase = prog * Math.PI * 2 * blinkCycles;
            document.getElementById("p1-caret").style.opacity =
              Math.sin(phase) > 0 ? "1" : "0";
          },
        },
        caretStart
      );

      /* ── Final beat holds: subtle jitter on the settled mint payoff
         (sine-wave-loop, LOW amplitude). Bounded, finite, no repeat/yoyo.
         Runs from ~3.7s to the 4.0s end. ── */
      const jitter = { p: 0 };
      const jitStart = 3.7;
      const jitDur = 4 - jitStart; // 0.3s
      tl.to(
        jitter,
        {
          p: Math.PI * 2 * 1, // one gentle cycle
          duration: jitDur,
          ease: "none",
          onUpdate: () => {
            const y = Math.sin(jitter.p) * 2.5; // ±2.5px, barely perceptible
            document.getElementById("p1-payoff").style.transform =
              `translate(-50%, calc(-50% + ${y}px)) scale(1)`;
          },
        },
        jitStart
      );

      window.__timelines["01-pain"] = tl;
    </script>
  </div>
</template>
