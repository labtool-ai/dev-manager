    <style>

          <div class="f3-pill" id="f3-pill-metrics" style="left: 42%; top: 33.9%; transform-origin: 0% 50%; margin-left: 120px; margin-top: -96px">

          <div class="f3-leader" id="f3-leader-ctrl" data-rot="38" style="left: 49.7%; top: 38.9%; width: 130px"></div>
          <div class="f3-pill" id="f3-pill-ctrl" style="left: 49.7%; top: 38.9%; transform-origin: 0% 50%; margin-left: 118px; margin-top: 88px">

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};

        const W = 1920,
          H = 1080;
        const worldEl = document.getElementById("f3-world");

        // Marker dots are absolutely positioned by CSS within the fixed-size
        // window box, so their layout is available synchronously (no need to
        // await fonts/image — and the renderer requires a synchronous build).

        // Camera — single source of truth. Composite transform: translate then scale.
        // For a target at world offset (ox,oy), screen pos = (S*ox + x, S*oy + y).
        // To center it: x = -ox*S, y = -oy*S  (viewport-change single-wrapper form).
        const cam = { scale: 1, x: 0, y: 0 };
        const drift = { dx: 0, dy: 0 };
        function applyCamera() {
          worldEl.style.transform =
            "translate(" +
            (cam.x + drift.dx) +
            "px, " +
            (cam.y + drift.dy) +
            "px) scale(" +
            cam.scale +
            ")";
        }
        applyCamera();

        // Measure a marker dot's neutral-camera center → offset from viewport center.
        function offsetOf(id) {
          // neutralize camera before measuring
          const prev = worldEl.style.transform;
          worldEl.style.transform = "translate(0px,0px) scale(1)";
          const r = document.getElementById(id).getBoundingClientRect();
          const stage = document
            .getElementById("f3-stage")
            .getBoundingClientRect();
          worldEl.style.transform = prev;
          // scale DOM px back to composition px in case preview is letterboxed
          const sx = W / stage.width;
          const sy = H / stage.height;
          const cx = (r.left + r.width / 2 - stage.left) * sx;
          const cy = (r.top + r.height / 2 - stage.top) * sy;
          return { x: cx - W / 2, y: cy - H / 2 };
        }

        const offLog = offsetOf("f3-dot-log");
        const offMet = offsetOf("f3-dot-metrics");
        const offQr = offsetOf("f3-dot-qr");
        const offCtrl = offsetOf("f3-dot-ctrl");

        const tl = gsap.timeline({ paused: true });

        // continuous, always-on micro-drift so the camera never feels dead
        const dphase = { p: 0 };
        tl.to(
          dphase,
          {
            p: Math.PI * 2 * 2,
            duration: 8,
            ease: "none",
            onUpdate: () => {
              drift.dx = Math.sin(dphase.p) * 4;
              drift.dy = Math.sin(dphase.p * 1.3) * 2.5;
              applyCamera();
            },
          },
          0
        );

        // helper: move camera to an offset at a scale over a window
        function camTo(off, scale, at, dur) {
          tl.to(
            cam,
            {
              scale: scale,
              x: -off.x * scale,
              y: -off.y * scale,
              duration: dur,
              ease: "power3.inOut",
              onUpdate: applyCamera,
            },
            at
          );
        }

        // helper: reveal a hotspot marker (dot pop → leader draw → pill pop)
        function revealSpot(dotId, leaderId, pillId, at) {
          tl.fromTo(
            "#" + dotId,
            { scale: 0, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.4, ease: "power3.out" },
            at
          );
          const rot = Number(
            document.getElementById(leaderId).dataset.rot || 0
          );
          tl.fromTo(
            "#" + leaderId,
            { scaleX: 0, rotation: rot },
            { scaleX: 1, rotation: rot, duration: 0.35, ease: "power3.out" },
            at + 0.15
          );
          tl.fromTo(
            "#" + pillId,
            { scale: 0, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.5, ease: "power3.out" },
            at + 0.28
          );
        }

        // ── Scene 1 (0.0–1.2s): window settles center as hero ──────────
        tl.fromTo(
          "#f3-winwrap",
          { scale: 0.92, opacity: 0 },
          { scale: 1, opacity: 1, duration: 1.0, ease: "power3.out" },
          0
        );

        // ── Scene 2 (1.2–2.8s): zoom to LOG panel, dim rest, pill pops ──
        camTo(offLog, 1.7, 1.2, 1.2);
        tl.to("#f3-veil", { opacity: 1, duration: 0.9, ease: "power2.inOut" }, 1.3);
        revealSpot("f3-dot-log", "f3-leader-log", "f3-pill-log", 2.0);

        // ── Scene 3 (2.8–4.4s): pan to METRICS, pill, mem count-up ─────
        camTo(offMet, 1.9, 2.8, 1.2);
        revealSpot("f3-dot-metrics", "f3-leader-metrics", "f3-pill-metrics", 3.5);
        // count-up on the mem number, overlaid on the metrics row
        const mem = document.getElementById("f3-mem");
        const memState = { v: 0 };
        tl.set("#f3-mem", { opacity: 1 }, 3.5);
        tl.to(
          memState,
          {
            v: 264,
            duration: 0.9,
            ease: "power3.out",
            onUpdate: () => {
              mem.textContent = Math.round(memState.v) + " MB";
            },
          },
          3.5
        );

        // ── Scene 4 (4.4–6.0s): pan/zoom to QR card, pill, mint glow ───
        camTo(offQr, 1.85, 4.4, 1.2);
        // glow blooms behind the QR, landing with the pill
        const halo = document.getElementById("f3-halo");
        // position halo over the QR dot
        halo.style.left = "83%";
        halo.style.top = "30.8%";
        halo.style.width = "520px";
        halo.style.height = "520px";
        halo.style.marginLeft = "-260px";
        halo.style.marginTop = "-260px";
        tl.fromTo(
          "#f3-halo",
          { opacity: 0, scale: 0.8 },
          { opacity: 0.42, scale: 1, duration: 0.9, ease: "power2.out" },
          5.0
        );
        revealSpot("f3-dot-qr", "f3-leader-qr", "f3-pill-qr", 5.1);

        // ── Scene 5 (6.0–7.2s): pan to CONTROL buttons, press, pill ────
        camTo(offCtrl, 1.85, 6.0, 1.1);
        // press ripple behind the stop/start button
        const ring = document.getElementById("f3-ring");
        ring.style.left = "49.7%";
        ring.style.top = "38.9%";
        // press: compress ring in, spring release burst
        tl.fromTo(
          "#f3-ring",
          { opacity: 0, scale: 0.6 },
          { opacity: 0.9, scale: 1.15, duration: 0.16, ease: "power1.in" },
          6.7
        );
        tl.to(
          "#f3-ring",
          { opacity: 0, scale: 1.5, duration: 0.5, ease: "power2.out" },
          6.86
        );
        revealSpot("f3-dot-ctrl", "f3-leader-ctrl", "f3-pill-ctrl", 6.5);

        // ── Scene 6 (7.2–8.0s): pull back to full window, all dots co-visible ──
        // camera returns to neutral; veil clears; four dots briefly co-visible.
        tl.to(
          cam,
          {
            scale: 1,
            x: 0,
            y: 0,
            duration: 0.8,
            ease: "power3.inOut",
            onUpdate: applyCamera,
          },
          7.2
        );
        tl.to("#f3-veil", { opacity: 0, duration: 0.7, ease: "power2.inOut" }, 7.2);
        // pills fade back so the four mint dots read clean together (no exit of dots)
        tl.to(
          ["#f3-pill-log", "#f3-pill-metrics", "#f3-pill-qr", "#f3-pill-ctrl", "#f3-mem"],
          { opacity: 0, duration: 0.5, ease: "power2.inOut" },
          7.2
        );
        // ensure all four dots are visible in the pull-back (re-assert to full)
        tl.to(
          ["#f3-dot-log", "#f3-dot-metrics", "#f3-dot-qr", "#f3-dot-ctrl"],
          { opacity: 1, scale: 1, duration: 0.4, ease: "power2.out" },
          7.2
        );

        window.__timelines["03-feature"] = tl;
      })();
    </script>
  </div>
</template>
