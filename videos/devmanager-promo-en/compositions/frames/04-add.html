      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // ── Scene 1 (0.0–1.1s): left line1 types on + dialog slides in ──

        // eyebrow + accent rule
        tl.fromTo(
          "#f4-eyebrow",

          { opacity: 1, y: 0, duration: 0.45, ease: "power3.out" },
          0.1
        );
        tl.fromTo(

          { scaleX: 1, duration: 0.5, ease: "power3.out" },
          0.28
        );

        // dialog slides in from the right and settles (fromTo + smooth settle)

          "#f4-dialog",
          { opacity: 0, x: 120, scale: 0.94 },
          { opacity: 1, x: 0, scale: 1, duration: 1.0, ease: "power3.out" },
          0.15
        );

        // line 1 — discrete type-on with mint caret
        const LINE1 = "Folder + command = a project";
        const txtEl = document.getElementById("f4-line1-txt");
        const caretEl = document.getElementById("f4-caret");
        // reveal caret while typing
        tl.set("#f4-caret", { opacity: 1 }, 0.35);
        const typeState = { n: 0 };
        tl.to(
          typeState,
          {
            n: LINE1.length,
            duration: 1.15,
            ease: "none",
            onUpdate: () => {
              txtEl.textContent = LINE1.substring(0, Math.floor(typeState.n));
            },
          },
          0.4
        );
        // deterministic caret blink (finite sine, ~6 cycles across the type/hold)
        const blink = { p: 0 };
        tl.to(
          blink,
          {
            p: Math.PI * 2 * 6,
            duration: 3.4,
            ease: "none",
            onUpdate: () => {
              caretEl.style.opacity = Math.sin(blink.p) > 0 ? "1" : "0";
            },
          },
          0.4
        );

        // ── Scene 2 (1.1–2.2s): calm hold on the filled dialog ─────────

          { scale: 0.72, opacity: 0, duration: 0.42, ease: "power2.in" },

        );

          "#f4-card",

          { scale: 1, opacity: 1, duration: 0.6, ease: "power3.out" },
          2.47
        );
        // caret retires as line1 is done and focus moves to line2
        tl.to("#f4-caret", { opacity: 0, duration: 0.2 }, 2.3);

        // line 2 — per-word reveal (dynamic content sequencing feel)
        const words = gsap.utils.toArray("#f4-line2 .f4-w");
        words.forEach((el, i) => {
          tl.fromTo(
            el,
            { opacity: 0, y: 16 },
            { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" },
            2.5 + i * 0.075
          );
        });

        // ── Scene 4 (3.4–4.0s): hold; mint tag chip pulses once ────────
        // subtle jitter — a single finite bounded pulse (sin, sin(0)=0),

        tl.to(

            duration: 0.55,
            ease: "none",

        );
