      #root #node-ai .chip {

      /* Right process cluster */

        opacity: 0;
        will-change: transform, opacity;
      }
      #root #node-proc .cluster-label {
        font-size: 30px;

      /* closing line */

    <!-- Full-duration DARK charcoal ground (own clip layer, lowest track). -->
    <div

    ></div>

    <!-- Brand stamp -->
    <img

      src="assets/logo.png"
      alt=""
      data-start="0"
      data-duration="6"

    />

    <!-- Terminal card -->
    <div
      id="mcp-term"
      class="clip"
      data-start="0"
      data-duration="2.7"
      data-track-index="2"
    >
      <div class="term-bar">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="term-title">devmanager — mcp</span>
      </div>
      <div class="term-body">
        <span class="prompt">$</span><span id="mcp-cmd-wrap"><span id="mcp-pre"></span><span class="hl-wrap"><span id="hl-bar"></span><span id="mcp-pkg"></span><span id="hl-underline"></span></span></span><span id="mcp-cursor"></span>
      </div>

    <!-- Network stage -->
    <div
      id="mcp-net"
      class="clip"
      data-start="2.6"
      data-duration="3.4"
      data-track-index="3"
    >
      <svg id="mcp-net-svg" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
        <path id="mcp-connector" d="M 720 540 C 900 540 1020 540 1200 540" fill="none" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round" />
      </svg>

      <div id="node-ai">
        <div class="node-title">AI</div>
        <div class="node-sub">Model Context Protocol</div>
        <div class="chips">
          <span class="chip">Claude</span>
          <span class="chip">Codex</span>
          <span class="chip">Cursor</span>
        </div>
      </div>

      <div id="node-proc">
        <div class="cluster-label">Your dev processes</div>
        <div class="grid">
          <div class="proc" data-i="0"><span class="p-dot"></span><span class="p-name">web</span></div>
          <div class="proc" data-i="1"><span class="p-dot"></span><span class="p-name">api</span></div>
          <div class="proc" data-i="2"><span class="p-dot"></span><span class="p-name">worker</span></div>
          <div class="proc" data-i="3"><span class="p-dot"></span><span class="p-name">db</span></div>
          <div class="proc" data-i="4"><span class="p-dot"></span><span class="p-name">docs</span></div>
        </div>
      </div>

      <div id="mcp-pulse"></div>

      <div id="mcp-close">
        <span class="cl-word">One&nbsp;</span><span class="cl-word">command&nbsp;</span><span class="cl-word">&mdash;&nbsp;</span><span class="cl-word cl-em">let&nbsp;</span><span class="cl-word cl-em">AI&nbsp;</span><span class="cl-word cl-em">run&nbsp;</span><span class="cl-word cl-em">your&nbsp;</span><span class="cl-word cl-em">processes</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ── Command copy. The package tail lives in its own span so the mint
      // highlight can sweep it (Scene 2). ──
      const PRE = "claude mcp add devmanager -- npx ";
      const PKG = "@labtool/devmanager-mcp";
      const FULL = PRE + PKG;

      const preEl = document.getElementById("mcp-pre");
      const pkgEl = document.getElementById("mcp-pkg");
      const cursorEl = document.getElementById("mcp-cursor");

      // ── Beat grid ──
      const TERM_IN = 0.0;   // terminal card fades up
      const TYPE_START = 0.35;
      const TYPE_END = 1.55;  // char-by-char type-on completes
      const ENTER = 1.7;      // Enter — highlight sweep on the package
      const RECOMPOSE = 2.6;  // terminal → network
      const CLOSE = 4.35;     // closing line reveal begins
      const HOLD_START = 5.1;

      // ── Scene 1 — terminal card fades/rises in; logo stamp fades ──
      tl.fromTo(
        "#mcp-term",
        { opacity: 0, y: 26, scale: 0.985 },
        { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "power3.out" },
        TERM_IN
      );
      tl.fromTo(
        "#mcp-logo",
        { opacity: 0, y: -8 },
        { opacity: 0.9, y: 0, duration: 0.6, ease: "power2.out" },
        0.15
      );

      // ── Char-by-char type-on (smooth slice) — cursor trails the text ──
      const typer = { n: 0 };
      tl.to(
        typer,
        {
          n: FULL.length,
          duration: TYPE_END - TYPE_START,
          ease: "none",
          onUpdate: () => {
            const k = Math.floor(typer.n);
            if (k <= PRE.length) {
              preEl.textContent = FULL.substring(0, k);
              pkgEl.textContent = "";
            } else {
              preEl.textContent = PRE;
              pkgEl.textContent = FULL.substring(PRE.length, k);
            }
          },
        },
        TYPE_START
      );

      // Cursor blink — deterministic sin square-wave (context-sensitive-cursor).
      // Mint throughout (system element); solid during active typing handled by pacing.
      const blink = { p: 0 };
      tl.to(
        blink,
        {
          p: Math.PI * 2 * 6, // ~6 blinks across the terminal window
          duration: 2.7,
          ease: "none",
          onUpdate: () => {
            cursorEl.style.opacity = Math.sin(blink.p) > 0 ? "1" : "0";
          },
        },
        0
      );

      // ── Scene 2 — Enter: mint highlight bar sweeps + underline draws the pkg ──
      tl.fromTo(
        "#hl-bar",
        { scaleX: 0 },
        { scaleX: 1, duration: 0.42, ease: "power2.out" },
        ENTER
      );
      tl.fromTo(
        "#hl-underline",
        { scaleX: 0 },
        { scaleX: 1, duration: 0.5, ease: "power2.out" },
        ENTER + 0.08
      );
      // cursor retires once command is confirmed
      tl.to("#mcp-cursor", { opacity: 0, duration: 0.2, ease: "power1.in" }, ENTER + 0.5);

      // ── Scene 3 — recompose into the AI ⇄ processes network ──
      // Terminal card is clip-gated out at 2.7s; network clip enters at 2.6s.
      tl.fromTo(
        "#node-ai",
        { opacity: 0, x: -40, scale: 0.96 },
        { opacity: 1, x: 0, scale: 1, duration: 0.55, ease: "power3.out" },
        RECOMPOSE + 0.05
      );
      gsap.utils.toArray("#node-ai .chip").forEach((chip, i) => {
        tl.fromTo(
          chip,
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" },
          RECOMPOSE + 0.35 + i * 0.12
        );
      });
      tl.fromTo(
        "#node-proc",
        { opacity: 0, x: 40, scale: 0.96 },
        { opacity: 1, x: 0, scale: 1, duration: 0.55, ease: "power3.out" },
        RECOMPOSE + 0.15
      );
      // process rows fade in (still gray)
      gsap.utils.toArray("#node-proc .proc").forEach((proc, i) => {
        tl.fromTo(
          proc,
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.36, ease: "power2.out" },
          RECOMPOSE + 0.45 + i * 0.07
        );
      });

      // Connector self-draws (svg-path-draw, dashoffset tween — no CSS keyframes).
      const connector = document.getElementById("mcp-connector");
      const cLen = connector.getTotalLength();
      connector.style.strokeDasharray = String(cLen);
      connector.style.strokeDashoffset = String(cLen);
      tl.to(
        connector,
        { strokeDashoffset: 0, duration: 0.7, ease: "power2.out" },
        RECOMPOSE + 0.55
      );

      // Mint pulse travels the connector (left → right), fades at each end.
      const pulse = document.getElementById("mcp-pulse");
      const travel = { t: 0 };
      tl.to(
        travel,
        {
          t: 1,
          duration: 0.85,
          ease: "power1.inOut",
          onUpdate: () => {
            const pt = connector.getPointAtLength(cLen * travel.t);
            const o = Math.sin(Math.min(Math.max(travel.t, 0), 1) * Math.PI); // 0→1→0
            pulse.style.transform = "translate(" + pt.x + "px," + pt.y + "px)";
            pulse.style.opacity = String(o);
          },
        },
        RECOMPOSE + 1.15
      );

      // ── Scene 4 — process dots turn gray → mint in sequence (= started by AI) ──
      const procDots = gsap.utils.toArray("#node-proc .proc");
      procDots.forEach((proc, i) => {
        const dot = proc.querySelector(".p-dot");
        const name = proc.querySelector(".p-name");
        tl.to(dot, { backgroundColor: "#2DD4BF", boxShadow: "0 0 18px 4px rgba(45,212,191,0.55)", duration: 0.3, ease: "power2.out" }, CLOSE - 0.55 + i * 0.13);
        tl.to(name, { color: "#F5F5F4", duration: 0.3, ease: "power2.out" }, CLOSE - 0.55 + i * 0.13);
        tl.to(proc, { borderColor: "rgba(45,212,191,0.30)", duration: 0.3, ease: "power2.out" }, CLOSE - 0.55 + i * 0.13);
      });

      // Closing line — per-word reveal (dynamic-content-sequencing feel).
      gsap.utils.toArray("#mcp-close .cl-word").forEach((w, i) => {
        tl.fromTo(
          w,
          { opacity: 0, y: 14 },
          { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" },
          CLOSE + i * 0.07
        );
      });

      // ── Scene 5 — hold; subtle jitter on the AI node (sine-wave-loop, LOW amp) ──
      const HOLD_DUR = 6 - HOLD_START;
      const jitter = { p: 0 };
      const aiNode = document.getElementById("node-ai");
      tl.to(
        jitter,
        {
          p: Math.PI * 2 * 1, // one gentle cycle across the hold
          duration: HOLD_DUR,
          ease: "none",
          onUpdate: () => {
            const y = Math.sin(jitter.p) * 2.2;        // ±2.2px bob
            const s = 1 + Math.sin(jitter.p) * 0.005;   // barely-there breath
            aiNode.style.transform = "translateY(" + y + "px) scale(" + s + ")";
          },
        },
        HOLD_START
      );

      window.__timelines["06-mcp"] = tl;
    </script>

</template>
