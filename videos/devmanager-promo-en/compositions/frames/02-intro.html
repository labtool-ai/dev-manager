        var words = gsap.utils.toArray("#intro-subtitle .w");
        words.forEach(function (el, i) {
          tl.fromTo(
            el,
            { opacity: 0, y: 22 },
            { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
            1.4 + i * 0.14
          );
        });

        // ---- Scene 3 (2.8–4.4s): window rises into RIGHT half ----
        // slides up from below+right with a small 3D lift, settles as hero.

        // Subtle jitter hold on the settled window (sine-wave-loop, low amp).

        var wrap = document.getElementById("intro-window-wrap");
        var jitter = { p: 0 };

            duration: 0.6,
            ease: "none",
            onUpdate: function () {
              var y = Math.sin(jitter.p) * 2.5;
              wrap.style.transform =
