<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #F5F5F4;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="37"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="el-01-pain"
        class="scene"
        data-composition-id="01-pain"
        data-composition-src="compositions/frames/01-pain.html"
        data-start="0"
        data-duration="4.5"
        data-track-index="0"
      ></div>

      <div
        id="el-02-intro"
        class="scene"
        data-composition-id="02-intro"
        data-composition-src="compositions/frames/02-intro.html"
        data-start="4"
        data-duration="5.5"
        data-track-index="1"
      ></div>

      <div
        id="el-03-feature"
        class="scene"
        data-composition-id="03-feature"
        data-composition-src="compositions/frames/03-feature.html"
        data-start="9"
        data-duration="8.6"
        data-track-index="0"
      ></div>

      <div
        id="el-04-add"
        class="scene"
        data-composition-id="04-add"
        data-composition-src="compositions/frames/04-add.html"
        data-start="17"
        data-duration="4"
        data-track-index="1"
      ></div>

      <div
        id="el-05-stats"
        class="scene"
        data-composition-id="05-stats"
        data-composition-src="compositions/frames/05-stats.html"
        data-start="21"
        data-duration="4.5"
        data-track-index="0"
      ></div>

      <div
        id="el-06-mcp"
        class="scene"
        data-composition-id="06-mcp"
        data-composition-src="compositions/frames/06-mcp.html"
        data-start="25"
        data-duration="6.5"
        data-track-index="1"
      ></div>

      <div
        id="el-07-brand"
        class="scene"
        data-composition-id="07-brand"
        data-composition-src="compositions/frames/07-brand.html"
        data-start="31"
        data-duration="6"
        data-track-index="0"
      ></div>

      <!-- BGM -->
      <audio
        id="el-bgm"
        src="assets/bgm/track.loop.mp3"
        data-start="0"
        data-duration="37"
        data-track-index="11"
        data-volume="0.9"
      ></audio>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
      // ── frame transitions (injected by transitions.mjs) ──
      (function () { var tl = window.__timelines["main"];
        tl.to("#el-01-pain", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 4);
        tl.fromTo("#el-02-intro", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 4);
        tl.to("#el-02-intro", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 9);
        tl.fromTo("#el-03-feature", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 9);
        tl.to("#el-03-feature", { filter: "blur(10px)", scale: 1.03, opacity: 0, duration: 0.6, ease: "power2.inOut" }, 17);
        tl.fromTo("#el-04-add", { filter: "blur(10px)", scale: 0.97, opacity: 0 }, { filter: "blur(0px)", scale: 1, opacity: 1, duration: 0.6, ease: "power2.inOut" }, 17);
        tl.to("#el-05-stats", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 25);
        tl.fromTo("#el-06-mcp", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 25);
        tl.to("#el-06-mcp", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 31);
        tl.fromTo("#el-07-brand", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 31);
        tl.to({}, { duration: 37 }, 0); // full-span anchor — main.duration() == composition total (Studio master duration)
      })();
    </script>
  </body>
</html>
