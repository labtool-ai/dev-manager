name: DevManager
options:
  bundleIdPrefix: com.ark
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.3"
    CURRENT_PROJECT_VERSION: "4"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  DevManager:
    type: application
    platform: macOS
    sources:
      - path: DevManager
    dependencies:
      - package: Sparkle
    info:
      path: DevManager/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        LSUIElement: false
        NSHumanReadableCopyright: ""
        # --- Sparkle 自动更新 ---
        SUFeedURL: "https://cdn.xdclab.com/devmanager/appcast.xml"
        SUPublicEDKey: "IVCTNlxhTlT9+Q3G65D+sVD4579+ax1eLMMdqMxqwmM="
        SUEnableAutomaticChecks: false   # feed 上线后改 true 开启后台自动检查
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ark.devmanager
        PRODUCT_NAME: DevManager
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
